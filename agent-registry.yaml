# Agents available to invite into meetings.
# Baked into the agent-bridge image at build time; each `brain` points at a running
# looped-af agent's TTY trigger (or webhook).
agents:
  - id: scout
    name: Scout
    description: A general-purpose research assistant that can look things up mid-meeting.
    greeting: "Hi, I'm Scout. Let me know if you need anything."
    # Hard turn gate: Scout only speaks when addressed by name or called on;
    # otherwise she raises her hand (or drops a note in chat).
    turn_policy: on-mention
    brain:
      kind: tty
      url: ws://demo-agent:8300/tty
      token_env: SCOUT_TTY_TOKEN
    # No realtime/stt/tts blocks: the communication method (and voice) is
    # chosen at invite time, and the schema defaults cover each mode. A
    # registry block would only pin a default; add one back to do that.

  - id: echo
    name: Echo
    description: Twin of Scout — same brain, pay-per-turn habits.
    greeting: "Hi, I'm Echo. Same brain as Scout, cheaper habits."
    brain:
      kind: tty
      url: ws://demo-agent:8300/tty
      token_env: SCOUT_TTY_TOKEN

