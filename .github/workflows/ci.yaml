name: CI

on:
  workflow_dispatch:
  pull_request:
  push:
    branches: ["main", "next"]

jobs:
  check:
    name: Lint, typecheck, test, build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install

      - run: pnpm lint

      - run: pnpm -r typecheck

      - run: pnpm -r test

      - run: pnpm -r build
        env:
          LIVEKIT_PUBLIC_URL: ws://localhost:7880
