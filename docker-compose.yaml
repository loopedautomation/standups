name: looped-standups

services:
  livekit:
    image: livekit/livekit-server:v1.8
    # Config is templated from .env — no separate livekit.yaml to keep in sync.
    # Local (defaults): advertises 127.0.0.1 so browsers on this machine work.
    # Production: set LIVEKIT_USE_EXTERNAL_IP=true and unset LIVEKIT_NODE_IP.
    environment:
      LIVEKIT_CONFIG: |
        port: 7880
        rtc:
          tcp_port: 7881
          port_range_start: 51000
          port_range_end: 51100
          use_external_ip: ${LIVEKIT_USE_EXTERNAL_IP:-false}
          node_ip: ${LIVEKIT_NODE_IP:-127.0.0.1}
          # Docker Desktop's UDP proxy is unreliable for WebRTC on macOS —
          # TCP-only media is rock solid for local dev. Set false in production.
          force_tcp: ${LIVEKIT_FORCE_TCP:-false}
        keys:
          ${LIVEKIT_API_KEY:-devkey}: ${LIVEKIT_API_SECRET:?set LIVEKIT_API_SECRET in .env}
        logging:
          level: info
    ports:
      - "7880:7880"
      - "7881:7881"
      # Must match rtc.port_range_start/end above
      - "51000-51100:51000-51100/udp"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:7880"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_LIVEKIT_URL: ${NEXT_PUBLIC_LIVEKIT_URL:-ws://localhost:7880}
    ports:
      - "3000:3000"
    environment:
      LIVEKIT_API_KEY: ${LIVEKIT_API_KEY}
      LIVEKIT_API_SECRET: ${LIVEKIT_API_SECRET}
      LIVEKIT_URL: ${LIVEKIT_URL:-ws://livekit:7880}
      NEXT_PUBLIC_LIVEKIT_URL: ${NEXT_PUBLIC_LIVEKIT_URL:-ws://localhost:7880}
      BRIDGE_URL: ${BRIDGE_URL:-http://agent-bridge:8090}
      BRIDGE_TOKEN: ${BRIDGE_TOKEN}
    depends_on:
      livekit:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://localhost:3000/api/health').then((r)=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  agent-bridge:
    build:
      context: .
      dockerfile: apps/agent-bridge/Dockerfile
    ports:
      - "8090:8090"
    environment:
      LIVEKIT_API_KEY: ${LIVEKIT_API_KEY}
      LIVEKIT_API_SECRET: ${LIVEKIT_API_SECRET}
      LIVEKIT_URL: ${LIVEKIT_URL:-ws://livekit:7880}
      BRIDGE_TOKEN: ${BRIDGE_TOKEN:?set BRIDGE_TOKEN in .env}
      AGENTS_CONFIG: /app/agents.yaml
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      ELEVENLABS_API_KEY: ${ELEVENLABS_API_KEY:-}
      SCOUT_TTY_TOKEN: ${SCOUT_TTY_TOKEN}
    volumes:
      - ./agents.yaml:/app/agents.yaml:ro
    depends_on:
      livekit:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://localhost:8090/health').then((r)=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  demo-agent:
    # Requires agent-framework >= 0.9 (tty trigger)
    image: ghcr.io/loopedautomation/agent:latest
    volumes:
      - ./examples/demo-agent/agent.yaml:/agent/agent.yaml:ro
      - demo-agent-data:/data
    environment:
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:?set ANTHROPIC_API_KEY in .env}
      SCOUT_TTY_TOKEN: ${SCOUT_TTY_TOKEN:?set SCOUT_TTY_TOKEN in .env}
    expose:
      - "8300"
    restart: unless-stopped

volumes:
  demo-agent-data:
